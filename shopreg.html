<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A1 Business Solutions - Shop Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

}

.container{

width:100%;
max-width:650px;
background:white;
border-radius:15px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.logo{

text-align:center;
font-size:28px;
font-weight:700;
color:#0b6b36;
margin-bottom:5px;

}

.subtitle{

text-align:center;
color:#777;
margin-bottom:30px;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;
margin-bottom:6px;
font-weight:600;
color:#333;

}

input,
select{

width:100%;
padding:12px 14px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:15px;
transition:.3s;

}

input:focus,
select:focus{

border-color:#0b6b36;
box-shadow:0 0 8px rgba(11,107,54,.25);

}

.row{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.cleaningBox{

display:flex;
gap:30px;
margin-top:8px;

}

.cleaningBox label{

display:flex;
align-items:center;
gap:8px;
cursor:pointer;
font-weight:500;

}

.cleaningBox input{

width:18px;
height:18px;

}

.amountBox{

position:relative;

}

.amountBox span{

position:absolute;
left:15px;
top:13px;
font-weight:bold;
color:#555;

}

.amountBox input{

padding-left:35px;

}

button{

width:100%;
padding:15px;
border:none;
background:#0b6b36;
color:white;
font-size:17px;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:.3s;
margin-top:10px;

}

button:hover{

background:#084d27;

}

.message{

display:none;
margin-top:20px;
padding:12px;
border-radius:6px;
text-align:center;
font-weight:600;

}

.success{

background:#d4edda;
color:#155724;

}

.error{

background:#f8d7da;
color:#721c24;

}

.footer{

margin-top:25px;
text-align:center;
font-size:13px;
color:#777;

}

@media(max-width:650px){

.row{

grid-template-columns:1fr;

}

.container{

padding:20px;

}

.logo{

font-size:22px;

}

}

</style>
</head>
<body>

<div class="container">

<div class="logo">A1 BUSINESS SOLUTIONS</div>

<div class="subtitle">
Cleaning Service Management System
</div>

<form id="shopForm">

<div class="form-group">
<label>Shop Name</label>
<input type="text" id="shopName" required>
</div>

<div class="row">

<div class="form-group">
<label>Place</label>

<select id="place" required>

<option value="">Select Place</option>

</select>

</div>

<div class="form-group">
<label>Landmark</label>
<input type="text" id="landmark">
</div>

</div>

<div class="form-group">
<label>Near Shop</label>
<input type="text" id="nearShop">
</div>

<div class="row">

<div class="form-group">
<label>Shop Type</label>

<select id="shopType">

<option value="">Select Shop Type</option>

<option>Jewellery</option>
<option>Fashion</option>
<option>Mobile Shop</option>
<option>Electronic</option>
<option>Other</option>

</select>

</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" id="phone" maxlength="10" required>
</div>

</div>

<div class="form-group">

<label>Cleaning Type</label>

<div class="cleaningBox">

<label>
<input type="checkbox" id="daily">
Daily Cleaning
</label>

<label>
<input type="checkbox" id="weekly">
Weekly Cleaning
</label>

</div>

</div>

<div class="row">

<div class="form-group">

<label>Plan</label>

<select id="plan">

<option value="">Select Plan</option>

<option>Light</option>
<option>Standard</option>
<option>Platinum</option>
<option>Premium</option>

</select>

</div>

<div class="form-group">

<label>Amount</label>

<div class="amountBox">

<span>₹</span>

<input
type="number"
id="amount">

</div>

</div>

</div>

<button type="submit">

Register Shop

</button>

<div id="msg" class="message"></div>

</form>

<div class="footer">

© 2026 A1 Business Solutions

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDjdeOUbsilqnLaXMGq-ruL4cV9epZuFRs",

authDomain:"a1business-55e5a.firebaseapp.com",

projectId:"a1business-55e5a",

storageBucket:"a1business-55e5a.firebasestorage.app",

messagingSenderId:"1067978149348",

appId:"1:1067978149348:web:c8c6ea7390b571ffc24bf1"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);	
const place=document.getElementById("place");

async function loadPlaces(){

place.innerHTML='<option value="">Select Place</option>';

const snapshot=await getDocs(collection(db,"places"));

snapshot.forEach(doc=>{

const data=doc.data();

place.innerHTML += `
<option value="${data.name}">
${data.name}
</option>`;

});

const selectedPlace=localStorage.getItem("selectedPlace");

if(selectedPlace){

place.value=selectedPlace;

}

}

loadPlaces();

const daily=document.getElementById("daily");

const weekly=document.getElementById("weekly");

const plan=document.getElementById("plan");

const amount=document.getElementById("amount");

const msg=document.getElementById("msg");

const rates={

Light:{
Daily:4000,
Weekly:2000
},

Standard:{
Daily:6000,
Weekly:4000
},

Platinum:{
Daily:9500,
Weekly:6000
},

Premium:{
Daily:18500,
Weekly:null
}

};

daily.addEventListener("change",()=>{

if(daily.checked){

weekly.checked=false;

}

updateAmount();

});

weekly.addEventListener("change",()=>{

if(weekly.checked){

daily.checked=false;

}

updateAmount();

});

plan.addEventListener("change",updateAmount);

function updateAmount(){

let type="";

if(daily.checked)
type="Daily";

if(weekly.checked)
type="Weekly";

if(type==""||plan.value==""){

amount.value="";

return;

}

let price=rates[plan.value][type];

if(price==null){

alert("Premium Plan does not support Weekly Cleaning.");

amount.value="";

return;

}

amount.value=price;

}
document.getElementById("shopForm").addEventListener("submit", async (e)=>{

e.preventDefault();

if(!daily.checked && !weekly.checked){

showMessage("Please select Cleaning Type","error");

return;

}

const shopName=document.getElementById("shopName").value.trim();

const placeValue=place.value.trim();

const landmark=document.getElementById("landmark").value.trim();

const nearShop=document.getElementById("nearShop").value.trim();

const shopType=document.getElementById("shopType").value;

const phone=document.getElementById("phone").value.trim();

const cleaningType=daily.checked ? "Daily" : "Weekly";

const planName=plan.value;

const amountValue=Number(amount.value);

if(shopName==""){

showMessage("Enter Shop Name","error");

return;

}

if(placeValue==""){

showMessage("Enter Place","error");

return;

}

if(shopType==""){

showMessage("Select Shop Type","error");

return;

}

if(phone.length!=10){

showMessage("Enter Valid Phone Number","error");

return;

}

if(planName==""){

showMessage("Select Plan","error");

return;

}

try{

await addDoc(collection(db,"shops"),{

shopName:shopName,

place:placeValue,

landmark:landmark,

nearShop:nearShop,

shopType:shopType,

phone:phone,

cleaningType:cleaningType,

plan:planName,

amount:amountValue,

payment:"Not Paid",

status:"Active",

createdAt:serverTimestamp()

});

showMessage("Shop Registered Successfully","success");

document.getElementById("shopForm").reset();

amount.value="";

daily.checked=false;

weekly.checked=false;

}
catch(error){

showMessage(error.message,"error");

}

});

function showMessage(text,type){

msg.style.display="block";

msg.className="message "+type;

msg.innerHTML=text;

setTimeout(()=>{

msg.style.display="none";

},3000);

}

</script>

</body>
</html>
