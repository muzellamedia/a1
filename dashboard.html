<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A1 Business Solutions</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#f5f7fb;

}

.header{

background:#0b6b36;
color:#fff;
padding:20px;
text-align:center;
font-size:26px;
font-weight:700;

}

.sub{

font-size:15px;
font-weight:400;
margin-top:5px;

}

.container{

max-width:1100px;
margin:25px auto;
padding:15px;

}

.placeCard{

background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 15px rgba(0,0,0,.08);
margin-bottom:20px;

}

.placeCard h3{

margin-bottom:15px;
color:#333;

}

select{

width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;

}

.createPlace{

margin-top:15px;
display:flex;
gap:10px;

}

.createPlace input{

flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;

}

.createPlace button{

padding:12px 20px;
border:none;
background:#0b6b36;
color:#fff;
border-radius:8px;
cursor:pointer;

}

.summary{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-bottom:25px;

}

.card{

background:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 15px rgba(0,0,0,.08);

}

.card h2{

font-size:40px;
color:#0b6b36;

}

.card p{

margin-top:10px;
font-size:18px;
font-weight:600;

}

.menu{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;

}

.menu a{

text-decoration:none;

}

.box{

background:#fff;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 15px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;

}

.box:hover{

transform:translateY(-5px);

}

.icon{

font-size:45px;
margin-bottom:12px;

}

.title{

font-size:18px;
font-weight:600;
color:#333;

}

.footer{

margin-top:40px;
text-align:center;
color:#888;
font-size:14px;

}

@media(max-width:900px){

.menu{

grid-template-columns:repeat(2,1fr);

}

.summary{

grid-template-columns:1fr;

}

}

@media(max-width:600px){

.menu{

grid-template-columns:1fr;

}

.header{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="header">

A1 BUSINESS SOLUTIONS

<div class="sub">

Cleaning Service Management System

</div>

</div>

<div class="container">

<div class="placeCard">

<h3>Select Place</h3>

<select id="placeSelect">

<option value="">Select Place</option>

</select>

<div class="createPlace">

<input
type="text"
id="newPlace"
placeholder="Create New Place">

<button id="addPlace">

Add

</button>

</div>

</div>

<div class="summary">

<div class="card">

<h2 id="shopCount">0</h2>

<p>Total Shops</p>

</div>

<div class="card">

<h2 id="staffCount">0</h2>

<p>Total Staff</p>

</div>

</div>

<div class="menu">

<a href="shopreg.html" id="addShopLink">

<div class="box">

<div class="icon">🏪</div>

<div class="title">

Add Shop

</div>

</div>

</a>

<a href="staffreg.html" id="addStaffLink">

<div class="box">

<div class="icon">👷</div>

<div class="title">

Add Staff

</div>

</div>

</a>

<a href="shoplist.html">

<div class="box">

<div class="icon">📋</div>

<div class="title">

Shop List

</div>

</div>

</a>

<a href="stafflist.html">

<div class="box">

<div class="icon">👥</div>

<div class="title">

Staff List

</div>

</div>

</a>

<a href="managestaff.html">

<div class="box">

<div class="icon">⚙️</div>

<div class="title">

Manage Staff

</div>

</div>

</a>

<a href="status.html">

<div class="box">

<div class="icon">📅</div>

<div class="title">

Status

</div>

</div>

</a>

<a href="accounts.html">

<div class="box">

<div class="icon">💰</div>

<div class="title">

View Accounts

</div>

</div>

</a>

</div>

<div class="footer">

© 2026 A1 Business Solutions

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDjdeOUbsilqnLaXMGq-ruL4cV9epZuFRs",
authDomain:"a1business-55e5a.firebaseapp.com",
projectId:"a1business-55e5a",
storageBucket:"a1business-55e5a.firebasestorage.app",
messagingSenderId:"1067978149348",
appId:"1:1067978149348:web:c8c6ea7390b571ffc24bf1"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const placeSelect=document.getElementById("placeSelect");

const newPlace=document.getElementById("newPlace");

const addPlace=document.getElementById("addPlace");

const addShopLink=document.getElementById("addShopLink");

const addStaffLink=document.getElementById("addStaffLink");

const shopCount=document.getElementById("shopCount");

const staffCount=document.getElementById("staffCount");

loadPlaces();

async function loadPlaces(){

placeSelect.innerHTML='<option value="">Select Place</option>';

const snap=await getDocs(collection(db,"places"));

snap.forEach(doc=>{

const data=doc.data();

placeSelect.innerHTML+=`
<option value="${data.name}">
${data.name}
</option>`;

});

}

addPlace.onclick=async()=>{

const place=newPlace.value.trim();

if(place==""){

alert("Enter Place");

return;

}

await addDoc(collection(db,"places"),{

name:place,

status:"Active",

createdAt:serverTimestamp()

});

newPlace.value="";

loadPlaces();

alert("Place Added Successfully");

};

addShopLink.onclick=()=>{

window.location.href="shopreg.html";

};

addStaffLink.onclick=()=>{

window.location.href="staffreg.html";

};

placeSelect.onchange=()=>{

const place=placeSelect.value;

localStorage.setItem("selectedPlace",place);

loadCounts(place);

};

window.onload=()=>{

const savedPlace=localStorage.getItem("selectedPlace");

if(savedPlace){

placeSelect.value=savedPlace;

loadCounts(savedPlace);

}

};

async function loadCounts(place){

if(place==""){

shopCount.innerHTML="0";

staffCount.innerHTML="0";

return;

}

const shopQuery=query(

collection(db,"shops"),

where("place","==",place)

);

const shopSnap=await getDocs(shopQuery);

shopCount.innerHTML=shopSnap.size;

const staffQuery=query(

collection(db,"staff"),

where("place","==",place)

);

const staffSnap=await getDocs(staffQuery);

staffCount.innerHTML=staffSnap.size;

}

</script>

</body>

</html>
